name: Export monday.com Board to CSV

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  export:
    name: Fetch & Save Board CSV
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run export script
        env:
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
          MONDAY_BOARD_ID: ${{ secrets.MONDAY_BOARD_ID }}
          OUTPUT_DIR: exports
        run: python export_monday_board.py

      - name: Send callout emails
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          OUTPUT_DIR: exports
          SENT_LOG: exports/sent_log.json
        run: python send_callout_emails.py

      - name: Commit exported CSV and sent log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add exports/
          git diff --cached --quiet || git commit -m "chore: daily monday.com export $(date -u +'%Y-%m-%d')"
          git push
